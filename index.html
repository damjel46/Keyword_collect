<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>미리캔버스 태그 생성기</title>
<style>
* { box-sizing: border-box; }
body {
  max-width: 720px;
  margin: 0 auto;
  font-family: "Pretendard", -apple-system, "Segoe UI", sans-serif;
  padding: 20px 16px;
  color: #2b2418;
  background: #fbf7f0;
}
header { margin-bottom: 18px; }
h1 { font-size: 20px; margin: 0 0 4px; font-weight: 800; letter-spacing: -0.02em; color: #21352f; }
.sub { font-size: 13px; color: #8a7f6c; margin: 0; }

.add-form {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 10px;
}
.add-form input[type="text"] {
  flex: 1 1 160px;
  min-width: 0;
  padding: 10px 12px;
  border: 1px solid #e4dcc9;
  border-radius: 10px;
  font-size: 14px;
  background: #fff;
}
.file-label {
  display: inline-flex;
  align-items: center;
  padding: 10px 12px;
  border: 1px solid #e4dcc9;
  border-radius: 10px;
  background: #fff;
  font-size: 13px;
  cursor: pointer;
  color: #5b5342;
}
.file-label input[type="file"] { display: none; }

.image-preview[hidden] { display: none; }
.image-preview {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
  font-size: 13px;
  color: #5b5342;
}
.image-preview img { width: 48px; height: 48px; object-fit: contain; border-radius: 10px; border: 1px solid #e4dcc9; background: #fff; }

.toolbar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
button {
  border: 1px solid #e4dcc9;
  background: #fff;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 13px;
  cursor: pointer;
  color: #4a4334;
}
button.primary { background: #1f7a63; color: #fff; border-color: #1f7a63; font-weight: 600; }

.status-banner {
  background: #fdf1e2;
  border: 1px solid #f0d9ad;
  color: #a8611a;
  border-radius: 10px;
  padding: 10px 14px;
  margin-bottom: 12px;
  font-size: 13px;
}

.stats-strip {
  display: flex;
  background: #fff;
  border: 1px solid #ece4d3;
  border-radius: 12px;
  margin-bottom: 14px;
  overflow: hidden;
}
.stats-strip .stat-cell {
  flex: 1;
  padding: 10px 8px;
  text-align: center;
  border-left: 1px solid #ece4d3;
}
.stats-strip .stat-cell:first-child { border-left: none; }
.stat-label { font-size: 10px; color: #9a8f78; }
.stat-value { font-size: 17px; font-weight: 800; margin-top: 2px; color: #21352f; }

.results-list {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
  margin-bottom: 14px;
}
@media (min-width: 480px) {
  .results-list { grid-template-columns: repeat(2, 1fr); }
}
.result-card {
  display: flex;
  flex-direction: column;
  gap: 8px;
  background: #fff;
  border: 1px solid #ece4d3;
  border-radius: 14px;
  padding: 12px;
}
.result-card .thumb-row { display: flex; justify-content: center; }
.result-card img { width: 64px; height: 64px; object-fit: contain; border-radius: 10px; background: #f5f0e5; }
.result-card .no-img { width: 64px; height: 64px; border-radius: 10px; background: #f5f0e5; }
.result-body { min-width: 0; }
.result-name { font-size: 13px; font-weight: 700; margin-bottom: 6px; display: flex; justify-content: space-between; gap: 8px; color: #21352f; }
.result-name .remove { font-size: 12px; color: #c05a3d; cursor: pointer; font-weight: 400; }
.result-tags { display: flex; flex-wrap: wrap; gap: 4px; }

.tag-chip {
  display: inline-block;
  background: #e6f2ec;
  color: #1f7a63;
  border-radius: 999px;
  padding: 3px 10px;
  font-size: 12px;
  cursor: pointer;
  border: 1px solid transparent;
}
.tag-chip.selected { border-color: #1f7a63; background: #c8e7da; }

.selected-panel {
  background: #fff;
  border: 1px solid #ece4d3;
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 12px;
}
.selected-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 13px; flex-wrap: wrap; gap: 8px; color: #21352f; font-weight: 700; }
.selected-list { font-size: 13px; color: #5b5342; min-height: 20px; word-break: break-word; }
</style>
</head>
<body>
  <header>
    <h1>미리캔버스 태그 생성기</h1>
    <p class="sub">요소 이름이나 사진을 넣으면 어울리는 태그를 만들어드려요. 인터넷 없이 이 화면 안에서만 처리돼요.</p>
  </header>

  <section class="add-form">
    <input type="text" id="nameInput" placeholder="요소 이름 (예: 과학, 비커)" />
    <label class="file-label">
      이미지 첨부
      <input type="file" id="imageInput" accept="image/*" />
    </label>
    <button id="addBtn" class="primary">태그 생성</button>
  </section>
  <div id="imagePreview" class="image-preview" hidden>
    <img id="previewImg" alt="첨부한 이미지 미리보기" />
    <span id="previewName"></span>
  </div>

  <div class="toolbar">
    <button id="exportCsv">CSV로 내보내기</button>
    <button id="exportJson">JSON으로 내보내기</button>
    <button id="clearAll">전체 삭제</button>
  </div>

  <div id="statusBanner" class="status-banner" hidden></div>

  <div class="stats-strip">
    <div class="stat-cell">
      <div class="stat-label">전체 항목</div>
      <div class="stat-value" id="statTotal">0</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">태그 생성됨</div>
      <div class="stat-value" id="statWithTags">0</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">매칭 실패</div>
      <div class="stat-value" id="statMissing">0</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">평균 신뢰도</div>
      <div class="stat-value" id="statAvgConfidence">0</div>
    </div>
  </div>

  <div id="resultsList" class="results-list"></div>

  <div class="selected-panel">
    <div class="selected-header">
      <span>담아둔 태그</span>
      <div>
        <button id="copySelected" class="primary">복사하기</button>
        <button id="clearSelected">선택 해제</button>
      </div>
    </div>
    <div id="selectedList" class="selected-list">아래 태그를 눌러서 담으면 여기에 콤마로 구분되어 표시돼요.</div>
  </div>

// ===== matcher.js =====
// 요소 이름 + (선택) 스타일 분석 결과를 CATEGORY_KEYWORDS와 매칭해 추천 태그를 산출한다.
// 완전 로컬 문자열 매칭. 외부 호출 없음.

function normalizeName(name) {
  return (name || "")
    .trim()
    .toLowerCase()
    .replace(/[\s_\-.]/g, "");
}

function resolveCategory(rawName) {
  const normalized = normalizeName(rawName);
  if (!normalized) return null;

  for (const synonym in SYNONYMS) {
    if (normalizeName(synonym) === normalized) {
      return SYNONYMS[synonym];
    }
  }

  for (const category in CATEGORY_KEYWORDS) {
    if (normalizeName(category) === normalized) {
      return category;
    }
  }

  // 부분 일치 (예: "여름바다svg" -> "바다")
  for (const category in CATEGORY_KEYWORDS) {
    if (normalized.includes(normalizeName(category))) {
      return category;
    }
  }

  return null;
}

// styleTags: analyzeImageStyle()이 산출한 ["귀여운", ...] 같은 부가 태그 배열 (선택)
function recommendTags(rawName, styleTags) {
  const category = resolveCategory(rawName);
  if (!category) {
    return { category: null, keywords: [], confidence: 0 };
  }

  const base = CATEGORY_KEYWORDS[category] || [];
  const extra = (styleTags || []).filter((t) => !base.includes(t));
  const keywords = [...base, ...extra];

  // 이름이 정확히 일치하면 confidence를 높게, 부분 일치면 낮게 부여
  const exactMatch = normalizeName(category) === normalizeName(rawName);
  const confidence = exactMatch ? 0.95 : 0.7;

  return { category, keywords, confidence };
}

// ===== styleAnalyzer.js =====
// 1단계 휴리스틱 이미지 스타일 분석: 색상 수 / 채도 / 윤곽선 복잡도로
// "귀여운·심플" vs "사실적·디테일" 스타일을 규칙 기반으로 추정한다.
// ML 모델 없이 Canvas API만 사용, 완전 로컬 처리.
//
// 주의: 이미지가 다른 오리진에서 로드되고 CORS 헤더가 없으면 캔버스가
// "오염"되어 getImageData가 실패한다. 이 경우 분석을 건너뛰고 null을 반환한다.

const STYLE_SAMPLE_SIZE = 32; // 성능을 위해 32x32로 축소해서 분석

function analyzeImageStyle(imgEl) {
  try {
    const canvas = document.createElement("canvas");
    canvas.width = STYLE_SAMPLE_SIZE;
    canvas.height = STYLE_SAMPLE_SIZE;
    const ctx = canvas.getContext("2d", { willReadFrequently: true });
    ctx.drawImage(imgEl, 0, 0, STYLE_SAMPLE_SIZE, STYLE_SAMPLE_SIZE);

    const { data } = ctx.getImageData(0, 0, STYLE_SAMPLE_SIZE, STYLE_SAMPLE_SIZE);
    return computeStyleFromPixels(data);
  } catch (err) {
    // CORS로 캔버스가 오염되었거나 이미지가 아직 로드되지 않은 경우
    return null;
  }
}

function computeStyleFromPixels(data) {
  const colorBuckets = new Set();
  let saturationSum = 0;
  let edgeSum = 0;
  let prevLuma = null;
  const pixelCount = data.length / 4;

  for (let i = 0; i < data.length; i += 4) {
    const r = data[i];
    const g = data[i + 1];
    const b = data[i + 2];

    // 색상을 16단계로 양자화해서 "실질적으로 다른 색"의 개수를 센다
    const bucket = [r, g, b].map((c) => Math.floor(c / 16)).join(",");
    colorBuckets.add(bucket);

    const max = Math.max(r, g, b);
    const min = Math.min(r, g, b);
    const saturation = max === 0 ? 0 : (max - min) / max;
    saturationSum += saturation;

    const luma = 0.299 * r + 0.587 * g + 0.114 * b;
    if (prevLuma !== null) {
      edgeSum += Math.abs(luma - prevLuma);
    }
    prevLuma = luma;
  }

  const uniqueColors = colorBuckets.size;
  const avgSaturation = saturationSum / pixelCount;
  const avgEdge = edgeSum / pixelCount;

  // 규칙: 색이 적고(단순한 팔레트) 윤곽선 변화가 완만하면 "귀여운/심플" 스타일로 판단
  const isSimpleStyle = uniqueColors < 40 && avgEdge < 25;

  return {
    uniqueColors,
    avgSaturation: Number(avgSaturation.toFixed(2)),
    avgEdge: Number(avgEdge.toFixed(2)),
    styleTags: isSimpleStyle ? ["귀여운", "심플한"] : ["사실적", "디테일한"],
    styleConfidence: isSimpleStyle
      ? Math.max(0.5, 1 - uniqueColors / 40)
      : Math.min(0.9, uniqueColors / 80)
  };
}

// ===== app.js =====
const STORAGE_KEY = "mc_tag_items";
const selectedTags = new Set();
let pendingImage = null; // { dataUrl, imgEl }

const el = (id) => document.getElementById(id);

function loadItems() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  } catch {
    return [];
  }
}

function saveItems(items) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
}

// 원본 사진(수 MB)을 그대로 localStorage에 저장하면 iOS 등에서 용량 제한(5~10MB)을
// 금방 넘겨 저장이 조용히 실패한다. 그래서 저장/미리보기용으로는 작은 JPEG 썸네일만 만든다.
function createThumbnail(imgEl, maxSize, quality) {
  const scale = Math.min(1, maxSize / Math.max(imgEl.naturalWidth || imgEl.width, imgEl.naturalHeight || imgEl.height));
  const w = Math.max(1, Math.round((imgEl.naturalWidth || imgEl.width) * scale));
  const h = Math.max(1, Math.round((imgEl.naturalHeight || imgEl.height) * scale));
  const canvas = document.createElement("canvas");
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(imgEl, 0, 0, w, h);
  return canvas.toDataURL("image/jpeg", quality);
}

function loadImageFromFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => resolve({ imgEl: img });
      img.onerror = () => reject(new Error("이미지를 열 수 없습니다. 이 사진 형식은 지원되지 않을 수 있어요."));
      img.src = reader.result;
    };
    reader.onerror = () => reject(new Error("파일을 읽는 중 오류가 발생했습니다."));
    reader.readAsDataURL(file);
  });
}

el("imageInput").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) {
    pendingImage = null;
    el("imagePreview").hidden = true;
    return;
  }
  try {
    const { imgEl } = await loadImageFromFile(file);
    const previewDataUrl = createThumbnail(imgEl, 160, 0.7);
    pendingImage = { imgEl, previewDataUrl };
    el("previewImg").src = previewDataUrl;
    el("previewName").textContent = file.name;
    el("imagePreview").hidden = false;
  } catch (err) {
    pendingImage = null;
    el("imagePreview").hidden = true;
    el("imageInput").value = "";
    alert(err.message || "사진을 불러오지 못했습니다.");
  }
});

el("addBtn").addEventListener("click", async () => {
  const name = el("nameInput").value.trim();
  if (!name) {
    el("nameInput").focus();
    return;
  }

  try {
    const style = pendingImage ? analyzeImageStyle(pendingImage.imgEl) : null;
    const { category, keywords, confidence } = recommendTags(name, style ? style.styleTags : []);

    const items = loadItems();
    items.unshift({
      id: Date.now(),
      name,
      thumbnail: pendingImage ? pendingImage.previewDataUrl : "",
      category,
      keywords,
      confidence: keywords.length ? confidence : 0
    });
    saveItems(items);
  } catch (err) {
    alert("태그를 만들지 못했습니다: " + (err.message || err));
    return;
  }

  el("nameInput").value = "";
  el("imageInput").value = "";
  pendingImage = null;
  el("imagePreview").hidden = true;

  render();
});

function removeItem(id) {
  const items = loadItems().filter((i) => i.id !== id);
  saveItems(items);
  render();
}

function toggleTag(keyword, chipEl) {
  if (selectedTags.has(keyword)) {
    selectedTags.delete(keyword);
    chipEl.classList.remove("selected");
  } else {
    selectedTags.add(keyword);
    chipEl.classList.add("selected");
  }
  el("selectedList").textContent = selectedTags.size
    ? Array.from(selectedTags).join(", ")
    : "아래 태그를 눌러서 담으면 여기에 콤마로 구분되어 표시돼요.";
}

function render() {
  const items = loadItems();

  el("statTotal").textContent = items.length;
  el("statWithTags").textContent = items.filter((i) => i.keywords.length > 0).length;
  el("statMissing").textContent = items.filter((i) => i.keywords.length === 0).length;
  el("statAvgConfidence").textContent = items.length
    ? Number((items.reduce((s, i) => s + i.confidence, 0) / items.length).toFixed(2))
    : 0;

  const banner = el("statusBanner");
  if (items.length) {
    banner.hidden = false;
    banner.textContent = `${items.length}개 항목의 태그를 만들었어요.`;
  } else {
    banner.hidden = true;
  }

  const list = el("resultsList");
  list.innerHTML = "";
  items.forEach((item) => {
    const card = document.createElement("div");
    card.className = "result-card";

    const thumbRow = document.createElement("div");
    thumbRow.className = "thumb-row";
    if (item.thumbnail) {
      const img = document.createElement("img");
      img.src = item.thumbnail;
      thumbRow.appendChild(img);
    } else {
      const noImg = document.createElement("div");
      noImg.className = "no-img";
      thumbRow.appendChild(noImg);
    }
    card.appendChild(thumbRow);

    const body = document.createElement("div");
    body.className = "result-body";

    const nameRow = document.createElement("div");
    nameRow.className = "result-name";
    const nameSpan = document.createElement("span");
    nameSpan.textContent = item.name;
    const removeSpan = document.createElement("span");
    removeSpan.className = "remove";
    removeSpan.textContent = "삭제";
    removeSpan.addEventListener("click", () => removeItem(item.id));
    nameRow.appendChild(nameSpan);
    nameRow.appendChild(removeSpan);
    body.appendChild(nameRow);

    const tagsRow = document.createElement("div");
    tagsRow.className = "result-tags";
    if (item.keywords.length === 0) {
      const missing = document.createElement("span");
      missing.style.fontSize = "12px";
      missing.style.color = "#9ca3af";
      missing.textContent = "어울리는 태그를 찾지 못했어요 (사전에 카테고리 추가 필요)";
      tagsRow.appendChild(missing);
    } else {
      item.keywords.forEach((kw) => {
        const chip = document.createElement("span");
        chip.className = "tag-chip";
        chip.textContent = kw;
        if (selectedTags.has(kw)) chip.classList.add("selected");
        chip.addEventListener("click", () => toggleTag(kw, chip));
        tagsRow.appendChild(chip);
      });
    }
    body.appendChild(tagsRow);

    card.appendChild(body);
    list.appendChild(card);
  });
}

el("copySelected").addEventListener("click", async () => {
  const text = Array.from(selectedTags).join(", ");
  await navigator.clipboard.writeText(text);
});

el("clearSelected").addEventListener("click", () => {
  selectedTags.clear();
  el("selectedList").textContent = "아래 태그를 눌러서 담으면 여기에 콤마로 구분되어 표시돼요.";
  document.querySelectorAll(".tag-chip.selected").forEach((c) => c.classList.remove("selected"));
});

el("clearAll").addEventListener("click", () => {
  localStorage.removeItem(STORAGE_KEY);
  selectedTags.clear();
  el("selectedList").textContent = "아래 태그를 눌러서 담으면 여기에 콤마로 구분되어 표시돼요.";
  render();
});

function downloadFile(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

el("exportCsv").addEventListener("click", () => {
  const items = loadItems();
  const rows = ["name,category,confidence,keywords"];
  items.forEach((i) => {
    rows.push(`"${i.name}","${i.category ?? ""}",${i.confidence},"${i.keywords.join("|")}"`);
  });
  downloadFile("mc_tags.csv", rows.join("\n"), "text/csv");
});

el("exportJson").addEventListener("click", () => {
  downloadFile("mc_tags.json", JSON.stringify(loadItems(), null, 2), "application/json");
});

render();
  </script>
